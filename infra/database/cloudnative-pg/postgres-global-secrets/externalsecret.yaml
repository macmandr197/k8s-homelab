---
# ClusterExternalSecret: pushes cnpg-s3-credentials into all CNPG cluster namespaces
# so that each Cluster resource can reference it locally for barman S3 backups.
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: cnpg-s3-credentials
spec:
  namespaceSelectors:
    - matchLabels:
        homelab/cnpg-s3-backup: "true"
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: "1h"
    secretStoreRef:
      kind: ClusterSecretStore
      name: 1password
    target:
      name: cnpg-s3-credentials
      creationPolicy: Owner
    data:
      - secretKey: AWS_ACCESS_KEY_ID
        remoteRef:
          key: "k8s operators b2 backup credentials"
          property: username
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
      - secretKey: AWS_SECRET_ACCESS_KEY
        remoteRef:
          key: "k8s operators b2 backup credentials"
          property: password
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
