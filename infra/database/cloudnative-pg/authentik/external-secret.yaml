apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-app-secret
  namespace: authentik
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: authentik-app-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: postgres-secrets
        property: authentik-db-username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: postgres-secrets
        property: authentik-db-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

