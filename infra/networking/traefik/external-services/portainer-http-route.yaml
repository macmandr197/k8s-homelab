apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portainer
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "portainer.mcmn.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: portainer-external
          port: 9000
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portainer-redirect
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - "portainer.mcmn.me"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: portainer-external
  namespace: traefik
  annotations:
    ignore-check.kube-linter.io/dangling-service: "Intentional headless service pointing to external IP via manual Endpoints"
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: http
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: portainer-external-slice
  namespace: traefik
  labels:
    kubernetes.io/service-name: portainer-external  # links slice to service
    endpointslice.kubernetes.io/managed-by: manual  # indicates that the endpoint slice is manually managed
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
addressType: IPv4
ports:
  - port: 9000
    protocol: TCP
    name: http
endpoints:
  - addresses:
      - "10.10.1.45"
    conditions:
      ready: true
