apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: portainer-transport
  namespace: traefik
spec:
  serverName: portainer
  insecureSkipVerify: true # Required since Portainer uses a self-signed cert out of the box
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portainer
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "portainer.mcmn.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: portainer-external
          port: 9443
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portainer-redirect
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - "portainer.mcmn.me"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: portainer-external
  namespace: traefik
  annotations:
    ignore-check.kube-linter.io/dangling-service: "Intentional headless service pointing to external IP via manual Endpoints"
    # Tells Traefik to use the transport defined above
    traefik.ingress.kubernetes.io/service.serverstransport: traefik-portainer-transport@kubernetescrd
    # Explicitly tells Traefik to use HTTPS to communicate with this service
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  ports:
    - port: 9443
      targetPort: 9443
      name: https
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: portainer-external-slice
  namespace: traefik
  labels:
    kubernetes.io/service-name: portainer-external  # links slice to service
    endpointslice.kubernetes.io/managed-by: manual  # indicates that the endpoint slice is manually managed
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
addressType: IPv4
ports:
  - port: 9443
    protocol: TCP
    name: https
endpoints:
  - addresses:
      - "10.10.1.45"
    conditions:
      ready: true
