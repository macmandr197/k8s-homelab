apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - external-secret.yaml
  - gateway-external.yaml
  - external-services/adguard-http-route.yaml
  - external-services/haas-http-route.yaml
  - external-services/portainer-http-route.yaml
  - external-services/stirling-http-route.yaml


helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: 39.0.9
    releaseName: traefik
    includeCRDs: true
    namespace: traefik
    valuesFile: values.yaml

generatorOptions:
  disableNameSuffixHash: true
