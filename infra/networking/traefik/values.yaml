# Configure Network Ports and EntryPoints
# EntryPoints are the network listeners for incoming traffic.
ports:
  # Defines the HTTP entry point named 'web'
  web:
    port: 80
    nodePort: 30000

  # Defines the HTTPS entry point named 'websecure'
  websecure:
    port: 443
    nodePort: 30001
    forwardedHeaders:
      trustedIPs:
        - "10.244.0.0/16"

  plex:
    port: 32400
    nodePort: 32400
    expose:
      default: true
    forwardedHeaders:
      trustedIPs:
        - "10.244.0.0/16"
# for when traffic is routed through CF tunnel. web->tunnel->gateway->pod. source IP may appear as though it is coming from a pod's IP instead of a web IP.

  # External-facing entrypoints bound to the external LB IP (172.16.18.30).
  # Traffic arrives directly from the internet (port-forwarded from firewall).
  # These are kept separate from the internal entrypoints so that routes
  # attached to the external gateway cannot accidentally bleed onto the
  # internal gateway and vice-versa.
  web-external:
    port: 8080        # internal port; nodePort maps to 80 externally via LB
    nodePort: 30002
    expose:
      default: true

  websecure-external:
    port: 8443        # internal port; nodePort maps to 443 externally via LB
    nodePort: 30003
    expose:
      default: true

# Enables the dashboard in Secure Mode
api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.mcmn.me`)
    entryPoints:
      - websecure
    middlewares:
      - name: dashboard-auth

# Creates a BasiAuth Middleware and Secret for the Dashboard Security
extraObjects:
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-auth
    spec:
      basicAuth:
        secret: traefik-portal-credentials

  # Second LoadBalancer Service for the external-facing gateway (172.16.18.30).
  # Kept as a separate Service so that the external IP is an explicit, auditable
  # boundary — only ports 80 and 443 are exposed, mapped to the web-external and
  # websecure-external entrypoints.  The internal service (172.16.18.2) is
  # unchanged and continues to serve all internal/CF-tunnel traffic.
  - apiVersion: v1
    kind: Service
    metadata:
      name: traefik-external
      namespace: traefik
      annotations:
        io.cilium/lb-ipam-ips: "172.16.18.30"
    spec:
      type: LoadBalancer
      externalTrafficPolicy: Local
      selector:
        app.kubernetes.io/name: traefik
        app.kubernetes.io/instance: traefik-traefik
      ports:
        - name: web-external
          port: 80
          targetPort: web-external
          protocol: TCP
        - name: websecure-external
          port: 443
          targetPort: websecure-external
          protocol: TCP

# We will route with Gateway API instead.
ingressClass:
  enabled: false

service:
  enabled: true
  type: LoadBalancer
  annotations:
    io.cilium/lb-ipam-ips: "172.16.18.2"
    externalTrafficPolicy: Local

# Enable Gateway API Provider & Disables the KubernetesIngress provider
# Providers tell Traefik where to find routing configuration.
providers:
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

## Gateway Listeners
gateway:
  annotations:
    cert-manager.io/cluster-issuer: mcmn-me-cloudflare-cluster-issuer
  listeners:
    web:           # HTTP listener that matches entryPoint `web`
      port: 80
      hostname: "*.mcmn.me"
      protocol: HTTP
      namespacePolicy:
        from: All

    websecure:         # HTTPS listener that matches entryPoint `websecure`
      port: 443
      hostname: "*.mcmn.me"
      protocol: HTTPS  # TLS terminates inside Traefik
      namespacePolicy:
        from: All
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: cert-mcmn-me
          group: ""  # necessary

    plex:         # HTTPS listener that matches entryPoint `plex`
      port: 32400
      hostname: "*.mcmn.me"
      protocol: HTTPS  # TLS terminates inside Traefik
      namespacePolicy:
        from: All
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: cert-mcmn-me
          group: ""  # necessary

    # External-facing listeners bound to the web-external / websecure-external
    # entrypoints.  Routes that should be reachable from the internet (without
    # the CF tunnel) attach to the `traefik-gateway-external` Gateway resource
    # defined in gateway-external.yaml, NOT to these listeners.  These listeners
    # exist only to advertise the entrypoints to the GatewayAPI controller so
    # that the separate Gateway resource can reference them.
    web-external:
      port: 8080
      hostname: "*.mcmn.me"
      protocol: HTTP
      namespacePolicy:
        from: All

    websecure-external:
      port: 8443
      hostname: "*.mcmn.me"
      protocol: HTTPS
      namespacePolicy:
        from: All
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: cert-mcmn-me-external
          group: ""

# Enable Observability
logs:
  general:
    level: INFO
  # This enables access logs, outputting them to Traefik's standard output by default. The [Access Logs Documentation](https://doc.traefik.io/traefik/observability/access-logs/) covers formatting, filtering, and output options.
  access:
    enabled: true

# Enables Prometheus for Metrics
metrics:
  prometheus:
    enabled: false
