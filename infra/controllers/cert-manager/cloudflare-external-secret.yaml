apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcmn-me-cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: mcmn-me-cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-email
      remoteRef:
        key: mcmn-me-cloudflare-api-token
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Fail
    - secretKey: api-token
      remoteRef:
        key: mcmn-me-cloudflare-api-token
        property: api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Fail