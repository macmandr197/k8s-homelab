apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-pool1-wger-media
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: pv-pool1-wger-media
    volumeAttributes:
      server: 10.10.1.46
      share: /pool-faster/appdata/wger/media
  mountOptions:
    - nfsvers=4.1
    - tcp
    - noatime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-wger-media
  namespace: wger
  labels:
    velero.io/exclude-from-backup: "true"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: pv-pool1-wger-media
  resources:
    requests:
      storage: 1Ti
---
