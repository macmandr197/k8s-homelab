apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wger-django-secret
  namespace: wger
  labels:
    app.kubernetes.io/name: wger-secrets
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: wger-django-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: "WGER Configuration"
        property: secret-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
