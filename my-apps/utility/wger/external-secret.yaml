apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wger-configuration-secrets
  namespace: wger
  labels:
    app.kubernetes.io/name: wger-secrets
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: wger-configuration-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: "WGER Configuration"
        property: secret_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
