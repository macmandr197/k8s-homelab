apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plex-configuration-secrets
  namespace: plex
  labels:
    app.kubernetes.io/name: plex-secrets
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: plex-configuration-secrets
    creationPolicy: Owner
  data:
    - secretKey: claim-code
      remoteRef:
        key: "Plex Configuration"
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
