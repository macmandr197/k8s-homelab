apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ns.yaml
- http-route.yaml
- appdata-pvc.yaml
- shared-media-pvc.yaml
helmCharts:
- includeCRDs: true
  name: jellyfin
  namespace: jellyfin
  releaseName: jellyfin
  repo: https://jellyfin.github.io/jellyfin-helm
  valuesFile: values.yaml
  version: 2.7.0
