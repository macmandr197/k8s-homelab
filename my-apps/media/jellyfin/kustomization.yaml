apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ns.yaml
  - http-route.yaml
  - appdata-pvc.yaml
  - shared-media-pvc.yaml
helmCharts:
  - name: jellyfin
    namespace: jellyfin
    repo: https://jellyfin.github.io/jellyfin-helm
    version: 2.7.0
    releaseName: jellyfin
    includeCRDs: true
    valuesFile: values.yaml
