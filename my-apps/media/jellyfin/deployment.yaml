apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      securityContext:
        # fsGroup ensures mounted volume files are group-accessible.
        # runAsUser/runAsGroup are intentionally omitted: the linuxserver image
        # runs as root initially and drops to the 'abc' user (PUID/PGID) via
        # its own s6-overlay init. Setting runAsUser here would break that.
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 44   # video group for hardware acceleration
          - 107  # render group for hardware acceleration
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:10.11.11
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          resources:
            limits:
              gpu.intel.com/xe: 1
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: appdata/jellyfin/config
            - name: media
              mountPath: /data
            - name: transcode-ramdisk
              mountPath: /transcode
          securityContext:
            privileged: false
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pvc-jellyfin-appdata
        - name: media
          persistentVolumeClaim:
            claimName: pvc-media-library-jellyfin
        - name: transcode-ramdisk
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
