apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-configuration-secrets
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik-secrets
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: authentik-configuration-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: "Authentik Configuration"
        property: secret_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: smtp-username
      remoteRef:
        key: "Authentik Configuration"
        property: smtp-username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: smtp-password
      remoteRef:
        key: "Authentik Configuration"
        property: smtp-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: smtp-server
      remoteRef:
        key: "Authentik Configuration"
        property: smtp-server
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
