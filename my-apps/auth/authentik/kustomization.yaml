apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

resources:
  - httproute.yaml
  - external-secret.yaml

helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io/
    version: 2026.2.1
    releaseName: authentik
    namespace: authentik
    valuesFile: values.yaml
    includeCRDs: true
